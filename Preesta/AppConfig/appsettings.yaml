Logger:
  Serilog:
    MinimumLevel: Verbose
    Using:
      - Serilog.Sinks.Console
      - Preesta
      - Serilog.Enrichers.Thread
    Enrich:
      - WithThreadId
    WriteTo:
      - Name: Console
        Args:
          outputTemplate: "[{Timestamp:HH:mm:ss} {Level:u3}] {Message:lj} {NewLine}{Exception}{NewLine}{Properties:j}{NewLine}"
          theme: "Serilog.Sinks.SystemConsole.Themes.AnsiConsoleTheme::Literate, Serilog.Sinks.Console"

Application:
  rulesFileName: rules.yaml
  maintenanceTeam: ""
  supervisors: ""
  subjectPrefix: ""

Jira:
  rootUri: https://valevitov.atlassian.net
  userName: "--- set in appsettings.secrets.yaml ---"
  password: "--- set in appsettings.secrets.yaml ---"
  apiToken: "--- set in appsettings.secrets.yaml ---"
  maxResults: 300

Smtp:
  Host: smtp.gmail.com
  Port: 465
  User: "--- set in appsettings.secrets.yaml ---"
  Password: "--- set in appsettings.secrets.yaml ---"
  From: "--- set in appsettings.secrets.yaml ---"
  EnableSsl: true

Telegram:
  botToken: "--- set in appsettings.secrets.yaml ---"

Linear:
  apiKey: ""        # Personal API key from Linear → Settings → Account → Security & Access → API
  workspace: ""     # Workspace URL key, e.g. "preesta-dev" for linear.app/preesta-dev
