Logger:
  Serilog:
    MinimumLevel: Verbose
    Using:
      - Serilog.Sinks.Console
      - Preesta
      - Serilog.Enrichers.Thread
    Enrich:
      - WithThreadId
    WriteTo:
      - Name: Console
        Args:
          outputTemplate: "[{Timestamp:HH:mm:ss} {Level:u3}] {Message:lj} {NewLine}{Exception}{NewLine}{Properties:j}{NewLine}"
          theme: "Serilog.Sinks.SystemConsole.Themes.AnsiConsoleTheme::Literate, Serilog.Sinks.Console"

Application:
  rulesFileName: rules.yaml
  maintenanceTeam: ""
  supervisors: ""
  subjectPrefix: ""

Jira:
  rootUri: https://valevitov.atlassian.net/   # omit the whole Jira section if you don't use Jira
  maxResults: 300
  # Credentials live in appsettings.secrets.yaml — either apiToken (Bearer),
  # or userName + password (Basic).

Smtp:
  Host: smtp.gmail.com
  # Port: 0                # optional; 0 = MailKit auto-picks per SecurityMode
  # SecurityMode: Auto     # optional; one of Auto|None|SslOnConnect|StartTls|StartTlsWhenAvailable
  User: "--- set in appsettings.secrets.yaml ---"
  Password: "--- set in appsettings.secrets.yaml ---"
  From: "--- set in appsettings.secrets.yaml ---"

Telegram:
  botToken: "--- set in appsettings.secrets.yaml ---"

Slack:
  botToken: "--- set in appsettings.secrets.yaml ---"

Linear:
  apiKey: ""        # Personal API key from Linear → Settings → Account → Security & Access → API
  workspace: ""     # Workspace URL key, e.g. "preesta-dev" for linear.app/preesta-dev

Github:
  token: ""         # Personal Access Token from GitHub → Settings → Developer settings → PAT
                    # Classic PAT needs `repo` (or `public_repo`) + `user:email` (or `read:user`).
                    # The email scope is required — GraphQL refuses the search query
                    # entirely (INSUFFICIENT_SCOPES) when `user.email` is unreadable.

Gitlab:
  token: ""         # Personal Access Token from GitLab → User → Edit profile → Access Tokens.
                    # Scope `read_api` is enough for read-only digests; add `api` only if
                    # you also want to run `mutations:` (write side).
                    # Recipient emails come from `User.publicEmail` — users who haven't
                    # exposed their email in profile settings appear with empty Email, so
                    # routing via `mailTo: assignee` skips them cleanly.
  apiBase: ""       # Defaults to https://gitlab.com/api/graphql. Override for self-hosted,
                    # e.g. https://gitlab.example.com/api/graphql.

Shortcut:
  apiToken: ""      # API token from app.shortcut.com/settings/account/api-tokens
                    # Workspace-scoped; the token's owner determines which stories
                    # are visible. Sent as `Shortcut-Token: <token>` header.
