# Preesta rules configuration (YAML format)

rules:
  - tracker: jira
    group: e2etest
    filter: "assignee = currentUser() AND resolution is EMPTY ORDER BY priority DESC, created ASC"
    notify:
      subject: "Daily Jira digest"
      followup: "Tickets assigned to you — move blockers to In Progress before standup."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"

  - tracker: jira
    group: e2etest
    filter: "reporter = currentUser() AND resolution is EMPTY ORDER BY created ASC"
    notify:
      subject: "Daily Jira digest"
      followup: "Tickets you reported that are still open."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns:
        - Key
        - Summary
        - Assignee
        - Status

  - tracker: jira
    group: e2etest
    filter: "project = SCRUM AND resolved >= -7d ORDER BY resolved DESC"
    notify:
      subject: "Daily Jira digest"
      followup: "Recently resolved — review and close the loop with stakeholders."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns:
        - Status
        - Resolution
        - Assignee
        - Updated

  - tracker: jira
    group: e2etest
    filter: "key = SCRUM-7"
    notify:
      subject: "Daily Jira digest"
      followup: "Full field showcase — every populated field on a single ticket."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns:
        - all-non-empty

  - tracker: linear
    group: e2etest
    filter: "issues assigned to me, not completed"
    notify:
      subject: "Linear digest"
      followup: "Open Linear tickets assigned to you."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns: [Status, Priority, Updated]

  - tracker: gitlab
    group: e2etest-gitlab
    filter:
      state: opened
      assigneeUsernames: [your-username]
    notify:
      subject: "GitLab digest"
      followup: "Open issues across your GitLab projects."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns: [Status, Updated, Labels]
    mutations:
      - mutation: |
          mutation {
            createNote(input: {
              noteableId: "{{@issueId}}",
              body: "Hi from Preesta live e2e — GitLab GraphQL mutation pipeline. Posted on `{{@issueKey}}`: _{{@title}}_."
            }) { note { id } }
          }

  - tracker: shortcut
    group: e2etest-shortcut
    filter: "id:26"
    notify:
      subject: "Shortcut digest"
      followup: "Open Shortcut stories assigned to you."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns: [Type, Status, Updated]
    mutations:
      - verb: POST
        urlPattern: "https://api.app.shortcut.com/api/v3/stories/{{@issueId}}/comments"
        body: |
          {"text": "Hi from Preesta live e2e — Shortcut REST mutation pipeline. Posted on `{{@issueKey}}`: *{{@title}}*."}

  - tracker: github
    group: e2etest-gh
    filter: "is:open is:issue repo:your-org/your-repo"
    notify:
      subject: "GitHub digest"
      followup: "Open issues and PRs in your personal repos."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns: [Type, Status, Updated, Labels]
    mutations:
      - mutation: |
          mutation {
            addComment(input: {
              subjectId: "{{@issueId}}",
              body: "Hi from Preesta live e2e — automated comment via GitHub GraphQL mutation pipeline. Posted for `{{@issueKey}}`: _{{@title}}_."
            }) { clientMutationId commentEdge { node { url } } }
          }

  - tracker: linear
    group: morning-standup
    filterRaw:
      and:
        - assignee:
            isMe:
              eq: true
        - cycle:
            isActive:
              eq: true
        - state:
            type:
              neq: completed
        - or:
            - hasBlockedByRelations:
                eq: false
            - dueDate:
                lte: P0D
    notify:
      subject: "Morning standup"
      followup: "Tickets in the active cycle that are on you today — focus list."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      slackUserId: "U01ABCDEFG"
      columns: [Status, Priority, DueDate, Updated]

# Email alias mappings
aliases: {}
