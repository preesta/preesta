# Preesta rules configuration (YAML format)
# To use: set "rulesFileName": "rules.yaml" in appsettings.json (or appsettings.yaml)

rules:
  - type: jql
    group: daily
    jql: "DueDate < startOfDay() AND Resolution is EMPTY"
    notify:
      subject: DueDate of the issue is expired
      mailTo: assignee
      cc: reporter,managers
      recommendations: Please resolve or reschedule the issue

  - type: jql
    group: hourly
    jql: >
      Project = SUPP AND Type = "Support Request"
      AND Resolution is EMPTY AND DueDate is EMPTY
    callRest:
      - verb: PUT
        urlPattern: "{{@jiraRoot}}rest/api/2/issue/{{@issueKey}}"
        body: |
          {
            "update": {
              "duedate": [{"set": "<<c# System.DateTime.Today.ToString(\"yyyy-MM-dd\") #>>"}],
              "comment": [{"add": {"body": "Approximate date of Support Request review"}}]
            }
          }

# Email alias mappings
redirectionRules:
  managers: "super_boss@example.com,super_boss2@example.com"
