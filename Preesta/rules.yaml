# Preesta rules configuration (YAML format)

rules:
  - type: jql
    group: e2etest
    jql: "assignee = currentUser() AND resolution is EMPTY ORDER BY priority DESC, created ASC"
    notify:
      subject: "Daily Jira digest"
      recommendations: "Tickets assigned to you — move blockers to In Progress before standup."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"

  - type: jql
    group: e2etest
    jql: "reporter = currentUser() AND resolution is EMPTY ORDER BY created ASC"
    notify:
      subject: "Daily Jira digest"
      recommendations: "Tickets you reported that are still open."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns:
        - Key
        - Summary
        - Assignee
        - Status

  - type: jql
    group: e2etest
    jql: "project = SCRUM AND resolved >= -7d ORDER BY resolved DESC"
    notify:
      subject: "Daily Jira digest"
      recommendations: "Recently resolved — review and close the loop with stakeholders."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns:
        - Status
        - Resolution
        - Assignee
        - Updated

  - type: jql
    group: e2etest
    jql: "key = SCRUM-7"
    notify:
      subject: "Daily Jira digest"
      recommendations: "Full field showcase — every populated field on a single ticket."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns:
        - all-non-empty

  - type: linear
    group: e2etest
    filter: "issues assigned to me, not completed"
    notify:
      subject: "Linear digest"
      recommendations: "Open Linear tickets assigned to you."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      columns: [Status, Priority, Updated]

  - type: linear
    group: morning-standup
    filterRaw:
      and:
        - assignee:
            isMe:
              eq: true
        - cycle:
            isActive:
              eq: true
        - state:
            type:
              neq: completed
        - or:
            - hasBlockedByRelations:
                eq: false
            - dueDate:
                lte: P0D
    notify:
      subject: "Morning standup"
      recommendations: "Tickets in the active cycle that are on you today — focus list."
      mailTo: you@example.com
      cc: ""
      telegramChatId: "12345678"
      slackUserId: "U01ABCDEFG"
      columns: [Status, Priority, DueDate, Updated]

# Email alias mappings
redirectionRules: {}
