site_name: Preesta
site_description: Rule-based digests for your issue trackers
site_url: https://preesta.dev/
repo_url: https://github.com/preesta/preesta
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Concepts:
    - concepts/obezlichennye-rules.md
    - concepts/rule-anatomy.md
    - concepts/routing-model.md
  - Trackers:
    - trackers/index.md
    - trackers/jira.md
    - trackers/linear.md
    - trackers/github.md
    - trackers/gitlab.md
    - trackers/shortcut.md
  - Delivery:
    - delivery/email.md
    - delivery/telegram.md
    - delivery/slack.md
  - Reference:
    - reference/rules-yaml-schema.md
    - reference/appsettings-schema.md
    - reference/markers.md
    - reference/cli.md
  - Operations:
    - operations/installation.md
    - operations/cron-and-schedules.md
    - operations/secrets-and-tokens.md
    - operations/logging-and-monitoring.md
    - operations/upgrading.md
    - operations/troubleshooting.md
  - Cookbook:
    - cookbook/index.md
    - cookbook/daily-standup.md
    - cookbook/stale-prs.md
    - cookbook/overdue-tickets.md
    - cookbook/auto-comment-stale.md
    - cookbook/auto-triage-blockers.md
    - cookbook/multi-tracker-digest.md
    - cookbook/per-team-routing.md
